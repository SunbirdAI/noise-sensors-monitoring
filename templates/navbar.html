<header class="topbar">
  <a class="brand" href="{% url 'home' %}">
    <span class="brand-mark">S</span>
    <span>
      <strong>Internal Noise Dashboard</strong>
      <small>Sensor health and field metrics</small>
    </span>
  </a>

  <div class="topbar-actions">
    {% if user.is_authenticated %}
    <span class="user-pill">Logged in as {{ user }}</span>
    <a class="btn btn-light" href="{% url 'logout' %}">Log out</a>
    {% else %}
    <a class="btn btn-light" href="{% url 'login' %}">Log in</a>
    <a class="btn btn-primary" href="{% url 'signup' %}">Sign up</a>
    {% endif %}
  </div>
</header>
